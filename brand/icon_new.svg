<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="seal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#c03528"/>
      <stop offset="1"   stop-color="#a02018"/>
    </linearGradient>
  </defs>

  <!-- Seal body: near-square with 2.5% corner radius -->
  <rect width="512" height="512" rx="13" ry="13" fill="url(#seal)"/>

  <!-- Traditional double-line inner border -->
  <rect x="20" y="20" width="472" height="472" rx="6" ry="6"
        fill="none" stroke="#f5ede0" stroke-width="5" stroke-opacity="0.82"/>
  <rect x="33" y="33" width="446" height="446" rx="3" ry="3"
        fill="none" stroke="#f5ede0" stroke-width="2.5" stroke-opacity="0.50"/>

  <!-- 墨 character — large, centered, serif -->
  <text x="256" y="262"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="STSong, SimSun, 'Songti SC', 'Noto Serif SC', Georgia, serif"
        font-size="330"
        font-weight="700"
        fill="#f5ede0">墨</text>
</svg>
